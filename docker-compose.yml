version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: geoscale-db
    environment:
      POSTGRES_DB: geoscale
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: geoscale-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/geoscale
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: geoscale-super-secret-key-minimum-32-characters!!
      MAIL_USERNAME: your@gmail.com
      MAIL_PASSWORD: your_app_password

volumes:
  pg_data: